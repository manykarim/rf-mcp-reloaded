[project]
name = "rfmcp-core"
version = "0.1.0"
description = "Shared contracts, validation, and core logic for rfmcp-reloaded."
readme = "../../README.md"
requires-python = ">=3.11,<3.14"
dependencies = [
    "pluggy>=1.6.0,<2",
    "pydantic>=2.13.4,<3",
    "PyYAML>=6.0.3,<7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rfmcp_core"]

[tool.hatch.build.targets.wheel.force-include]
"../../assets/hints/libraries/robotframework.browser.yaml" = "rfmcp_core/data/hints/libraries/robotframework.browser.yaml"

[tool.hatch.build.targets.sdist]
include = [
    "src/rfmcp_core/**/*.py",
]

[tool.hatch.build.targets.sdist.force-include]
"../../assets/hints/libraries/robotframework.browser.yaml" = "src/rfmcp_core/data/hints/libraries/robotframework.browser.yaml"

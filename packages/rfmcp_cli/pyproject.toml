[project]
name = "rfmcp-cli"
version = "0.1.0"
description = "Stateless CLI workflows and installers for rfmcp-reloaded."
readme = "../../README.md"
requires-python = ">=3.11,<3.14"
dependencies = [
    "rfmcp-core",
    "typer>=0.25.1,<1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
rfmcp = "rfmcp_cli.main:main"
